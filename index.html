<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ApotekAI - Obat Cepat</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  🚑 ApotekAI - Obat Cepat & Mudah
</header>

<section class="hero">
  <h1>Pesan Obat Online</h1>
  <p>Kirim cepat, konsultasi mudah via WhatsApp</p>
</section>

<div class="container">

  <form id="form">

    <input type="text" name="nama" placeholder="Nama Lengkap" required>
    <input type="text" name="wa" placeholder="No WhatsApp" required>

    <select name="obat">
      <option>Paracetamol</option>
      <option>Vitamin C</option>
      <option>OBH Batuk</option>
      <option>Amoxicillin</option>
    </select>

    <textarea name="alamat" placeholder="Alamat lengkap"></textarea>

    <button type="submit">Kirim Pesanan</button>

  </form>

  <p class="success" id="success">Pesanan berhasil dikirim!</p>

</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
